<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mátrix Futam - Pro v3</title>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
  <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --surface: #1e1e1e; --text: #ffffff; --accent: #292929; --error: #ff4444; --warning: #ffaa00; }
        
        /* Görgetés engedélyezése */
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background-color: var(--bg); color: var(--text); 
            display: flex; justify-content: center; 
            overflow-y: auto; /* Görgethető függőlegesen */
        }
        
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.1s; }
        .flash-success { background-color: rgba(0, 255, 136, 0.4); opacity: 1 !important; }
        .flash-error { background-color: rgba(255, 68, 68, 0.4); opacity: 1 !important; }

        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; min-height: 100vh; }

        .scanner-hidden {
    height: 0 !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
    overflow: hidden;
}
        
        /* Fejléc fixálása */
        header { position: sticky; top: 0; background: var(--bg); z-index: 50; padding: 10px 0; border-bottom: 1px solid var(--accent); }
        header h1 { text-align: center; color: var(--primary); font-size: 1.2rem; margin: 0; text-transform: uppercase; }

        .timer-section { background: var(--surface); padding: 15px; border-radius: 15px; text-align: center; margin: 10px 0; border: 1px solid var(--accent); }
        #stopper-kijelzo { font-family: monospace; font-size: 2.0rem; font-weight: bold; color: var(--primary); }
        #uzenet { font-size: 1.0rem; min-height: 3.0em; margin-top: 10px; }
        
        .scanner-section { background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); position: relative; min-height: 300px; }
        #olvaso-terulet { width: 100% !important; }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px; }
        button { padding: 15px; border-radius: 12px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; font-size: 0.9rem; }
        
        #save-btn { background: var(--primary); color: #000; display: none; }
        #reset-btn { background: #444; color: #fff; display: none; }
        #abort-btn { background: var(--error); color: #fff; } /* Mindig látható, ha be van töltve pálya */
        .btn-exit { background: transparent; color: #666; text-decoration: underline; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div class="app-container">
    <header><h1>Mátrix Futam v3</h1></header>
    
    <div class="timer-section">
        <div id="stopper-kijelzo">00:00.0</div>
        <p id="uzenet">Olvasd be a pálya kódját!</p>
    </div>

    <div class="scanner-section">
        <div id="olvaso-terulet"></div>
    </div>
   
    <div class="controls">
        <button id="save-btn">🏆 Eredmény Mentése</button>
        <button id="reset-btn">🔄 Új pálya választása</button>
        <button id="abort-btn" onclick="feladasKerdes()">❌ Futam Feladása</button>
        <button class="btn-exit" onclick="kilepes()">Kilépés az alkalmazásból</button>
    </div>
</div>

<script>
    const kijelzo = document.getElementById('stopper-kijelzo');
    const uzenet = document.getElementById('uzenet');
    const flash = document.getElementById('flash-overlay');
    const saveBtn = document.getElementById('save-btn');
    const resetBtn = document.getElementById('reset-btn');
    const abortBtn = document.getElementById('abort-btn');
    const html5QrCode = new Html5Qrcode("olvaso-terulet");
    
    let stopperFut = false, palyaKesz = false;
    let kezdIdo, intervallum, sorrend = [], sorrendIndex = 0;
    let utolsoKod = "", utolsoIdo = 0, log = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function hangjelzes(tipus) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (tipus === 'ok') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); }
            else if (tipus === 'start') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); }
            else { osc.frequency.setValueAtTime(220, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); }
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } catch(e) {}
    }

    function vizualisJelzes(tipus) {
        flash.className = tipus === 'ok' ? 'flash-success' : 'flash-error';
        setTimeout(() => { flash.className = ''; }, 150);
    }

    async function onScanSuccess(decodedText) {
        const most = Date.now();
        const szoveg = decodedText.toLowerCase().trim();
        if (szoveg === utolsoKod && (most - utolsoIdo < 2000)) return;
        utolsoKod = szoveg; utolsoIdo = most;

        if (szoveg.startsWith('start:') && !stopperFut && !palyaKesz) {
            sorrend = szoveg.replace('start:', '').split(',').map(s => s.trim());
            palyaKesz = true;
            uzenet.innerHTML = `Pálya betöltve: <b>${sorrend.length} pont</b><br>Indításhoz olvasd be a: <b style="color:var(--primary)">RAJT </b>kódot`;
            hangjelzes('ok'); vizualisJelzes('ok');
        }
        else if (szoveg === 'start' && palyaKesz && !stopperFut) {
            kezdIdo = Date.now(); stopperFut = true; sorrendIndex = 0;
            log = [{ pont: "RAJT", ido: "00:00.0" }];
            intervallum = setInterval(frissit, 100);
            uzenet.innerHTML = `A FUTAM ELINDULT!<br>Keresd: <b>${sorrend[0]}</b>`;
            hangjelzes('start'); vizualisJelzes('ok');
        }
        else if (stopperFut) {
            if (szoveg === sorrend[sorrendIndex]) {
                log.push({ pont: szoveg, ido: kijelzo.textContent });
                sorrendIndex++;
                vizualisJelzes('ok'); hangjelzes('ok');
                if (sorrendIndex === sorrend.length) uzenet.innerHTML = `Irány a <b style="color:var(--primary)">CÉL</b>!`;
                else uzenet.innerHTML = `Megvan:<b style="color:var(--primary)"> ${szoveg} </b><br>A következő pontod a: <b>${sorrend[sorrendIndex]}</b>`;
            } 
            else if (szoveg === 'stop') {
                if (sorrendIndex === sorrend.length) {
                    clearInterval(intervallum); stopperFut = false;
                    log.push({ pont: "STOP", ido: kijelzo.textContent });
                    uzenet.innerHTML = `<b style="color:var(--primary)">CÉLBA ÉRTÉL!</b><br>Idő: ${kijelzo.textContent}`;
                    saveBtn.style.display = "block"; resetBtn.style.display = "block"; 
                    html5QrCode.stop(); hangjelzes('start');
                    
                    const scannerBox = document.querySelector('.scanner-section');
        scannerBox.classList.add('scanner-hidden');
                    
                } else {
                    uzenet.innerHTML = `<b style='color:var(--error)'>HIÁNYZÓ PONTOK!</b><br>Kell még: ${sorrend.slice(sorrendIndex).join(',')}`;
                    hangjelzes('hiba'); vizualisJelzes('hiba');
                }
            } else { hangjelzes('hiba'); vizualisJelzes('hiba'); }
        }
    }

    function frissit() {
        const eltelt = Date.now() - kezdIdo;
        const p = Math.floor(eltelt / 60000);
        const m = Math.floor((eltelt % 60000) / 1000);
        const tized = Math.floor((eltelt % 1000) / 100);
        kijelzo.textContent = `${String(p).padStart(2,'0')}:${String(m).padStart(2,'0')}.${tized}`; scannerContainer.style.display = "block";
        
    }

    function feladasKerdes() {
        if(confirm("Biztosan feladod a futamot és törlöd a jelenlegi pályát?")) {
            location.reload(); scannerBox.classList.remove('scanner-hidden');
        }
    }

    function kilepes() { if(confirm("Kilépsz?")) window.close(); }

    resetBtn.addEventListener('click', () => { location.reload(); scannerBox.classList.remove('scanner-hidden'); }); 

    saveBtn.addEventListener('click', () => {
        const nev = prompt("Név:");
        if (!nev) return;
        let r = `--- MÁTRIX FUTAM ---\nNév: ${nev}\nÖsszidő: ${kijelzo.textContent}\n\nNapló:\n` + log.map(l => `${l.pont}: ${l.ido}`).join('\n');
        const b = new Blob([r], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = `eredmeny_${nev}.txt`; a.click();
    });

    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, onScanSuccess);
</script>
</body>
</html>
