<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mátrix Futam v3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --surface: #1e1e1e; --text: #fff; --error: #ff4444; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.1s; }
        .flash-success { background: rgba(0, 255, 136, 0.4); opacity: 1 !important; }
        .flash-error { background: rgba(255, 68, 68, 0.4); opacity: 1 !important; }

        header h1 { text-align: center; color: var(--primary); font-size: 1.2rem; margin: 10px 0; }
        .timer-section { background: var(--surface); padding: 10px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #333; }
        
        /* Kisebb betűméret itt */
        #stopper-kijelzo { font-family: monospace; font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        #uzenet { font-size: 0.95rem; margin-top: 5px; min-height: 3em; }

        .scanner-section { background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #333; min-height: 250px; }
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        button { padding: 14px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        #save-btn { background: var(--primary); color: #000; display: none; }
        #reset-btn { background: #444; color: #fff; display: none; }
        #abort-btn { background: var(--error); color: #fff; }
        .btn-exit { background: transparent; color: #666; text-decoration: underline; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>
<div class="app-container">
    <header><h1>Mátrix Futam v3</h1></header>
    <div class="timer-section">
        <div id="stopper-kijelzo">00:00.0</div>
        <p id="uzenet">Olvasd be a pálya kódját!</p>
    </div>
    <div class="scanner-section"><div id="olvaso-terulet"></div></div>
    <div class="controls">
        <button id="save-btn">🏆 Eredmény Mentése</button>
        <button id="reset-btn" onclick="location.reload()">🔄 Új pálya</button>
        <button id="abort-btn" onclick="confirm('Feladod?') && location.reload()">❌ Feladás</button>
        <button class="btn-exit" onclick="window.close()">Kilépés</button>
    </div>
</div>

<script>
    const kijelzo = document.getElementById('stopper-kijelzo'), uzenet = document.getElementById('uzenet'), flash = document.getElementById('flash-overlay');
    const saveBtn = document.getElementById('save-btn'), resetBtn = document.getElementById('reset-btn');
    const html5QrCode = new Html5Qrcode("olvaso-terulet");
    let running = false, ready = false, startT, timer, track = [], idx = 0, lastQr = "", lastT = 0;

    const beep = (f) => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    };

    const ui = (type) => {
        flash.className = type === 'ok' ? 'flash-success' : 'flash-error';
        setTimeout(() => flash.className = '', 150);
        beep(type === 'ok' ? 880 : 220);
    };

    function update() {
        const diff = Date.now() - startT;
        const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000), t = Math.floor((diff % 1000) / 100);
        kijelzo.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`;
    }

    async function onScan(text) {
        const now = Date.now();
        const code = text.toLowerCase().trim();
        if (code === lastQr && now - lastT < 2000) return;
        lastQr = code; lastT = now;

        if (code.startsWith('start:') && !running && !ready) {
            track = code.replace('start:', '').split(',').map(s => s.trim());
            ready = true; uzenet.innerHTML = `Pálya: ${track.length} pont. <br>Olvasd be a <b>Rajt</b>-ot!`; ui('ok');
        } else if (code === 'start' && ready && !running) {
            startT = Date.now(); running = true; idx = 0;
            timer = setInterval(update, 100);
            uzenet.innerHTML = `FUTAM! <br>Következő: <b>${track[0]}</b>`; ui('ok');
        } else if (running) {
            if (code === track[idx]) {
                idx++; ui('ok');
                uzenet.innerHTML = idx === track.length ? "Irány a <b>CÉL</b>!" : `Következő: <b>${track[idx]}</b>`;
            } else if (code === 'stop') {
                if (idx === track.length) {
                    clearInterval(timer); running = false;
                    uzenet.innerHTML = "CÉLBA ÉRTÉL!";
                    saveBtn.style.display = "block"; resetBtn.style.display = "block";
                    html5QrCode.stop(); ui('ok');
                } else { uzenet.innerHTML = "HIÁNYZÓ PONTOK!"; ui('err'); }
            } else ui('err');
        }
    }

    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
</script>
</body>
</html>
